<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Slot - Real Mechanics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }
        #ui-bar {
            width: 420px;
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 12px;
            border: 4px solid #4a4a4a;
            border-bottom: none;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: bold;
        }
        #game-div {
            border: 4px solid #4a4a4a;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .controls {
            width: 420px;
            background: #222;
            border: 4px solid #4a4a4a;
            border-top: none;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }
        button {
            background: #4a4a4a;
            color: #fff;
            border: 2px solid #616161;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        button:hover { background: #5a5a5a; }
        #spin-btn {
            background: #4caf50;
            border: 2px solid #81c784;
            padding: 14px;
            font-size: 20px;
            color: white;
            text-shadow: 1px 1px #000;
            width: 100%;
        }
        #spin-btn:hover { background: #66bb6a; }
        #spin-btn:disabled { background: #333; border-color: #555; cursor: not-allowed; }
        .yellow { color: #ffeb3b; }
        .green { color: #4caf50; }
        #jackpot-alert {
            color: #ff5555;
            text-align: center;
            font-weight: bold;
            height: 20px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>БАЛАНС: <span id="balance-txt" class="green">$1,000,000</span></div>
        <div>СТАВКА: <span id="bet-txt" class="yellow">200</span></div>
    </div>

    <div id="game-div"></div>

    <div class="controls">
        <div class="bet-row">
            <button onclick="changeBet('min')">МИН</button>
            <button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(100)">+100</button>
            <button onclick="changeBet('max')">МАКС</button>
        </div>
        <button id="spin-btn" onclick="pressSpin()">Вращать (СТАРТ)</button>
        <div id="jackpot-alert"></div>
    </div>

<script>
    let balance = 1000000;
    let bet = 200;
    let isPlaying = false;
    
    const config = {
        type: Phaser.AUTO,
        width: 420,
        height: 580,
        parent: 'game-div',
        backgroundColor: '#2c1e15',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let scene, blocksGroup, toolsGroup;
    let invSlots = [];

    // Правила прочности инструментов (какой тир что ломает)
    // 0: dirt, 1: stone, 2: iron, 3: diamond, 4: bedrock (Jackpot)
    const PICKAXE_TIERS = {
        'pick_wood': { tier: 0, color: '#b58259', label: '🪵' },
        'pick_stone': { tier: 1, color: '#9e9e9e', label: '🪨' },
        'pick_iron': { tier: 2, color: '#e0e0e0', label: '🪙' },
        'pick_gold': { tier: 2, color: '#ffd54f', label: '👑' }, // ломает как железо
        'pick_dia': { tier: 4, color: '#4dedf4', label: '💎' }  // максимальный тир, ломает бедрок
    };

    const BLOCK_TIERS = {
        'dirt':    { tier: 0, color: '#866043', payout: 0.2 },
        'stone':   { tier: 1, color: '#737373', payout: 0.5 },
        'iron':    { tier: 2, color: '#d7ccc8', payout: 2.0 },
        'diamond': { tier: 3, color: '#b2ebf2', payout: 10.0 },
        'bedrock': { tier: 4, color: '#111111', payout: 250.0 } // ДЖЕКПОТ Х250
    };

    function preload() {
        scene = this;
        // Текстуры блоков
        for (let key in BLOCK_TIERS) {
            createSquareTexture(key, BLOCK_TIERS[key].color, false);
        }
        // Текстуры кирок
        for (let key in PICKAXE_TIERS) {
            createSquareTexture(key, PICKAXE_TIERS[key].color, true);
        }
    }

    function create() {
        blocksGroup = this.physics.add.staticGroup();
        toolsGroup = this.physics.add.group();

        // Отрисовка 5 ячеек верхнего инвентаря
        let graphics = this.add.graphics();
        graphics.fillStyle(0x333333, 1);
        graphics.lineStyle(3, 0x555555, 1);
        
        for (let c = 0; c < 5; c++) {
            let x = c * 80 + 15;
            graphics.fillRect(x, 15, 70, 70);
            graphics.strokeRect(x, 15, 70, 70);
            
            // Текстовые метки для отображения кирок в инвентаре
            invSlots[c] = this.add.text(x + 20, 30, '❓', { fontSize: '32px' });
        }

        generateGrid();

        // Обработка столкновения кирки и блока
        this.physics.add.overlap(toolsGroup, blocksGroup, hitBlock, null, this);
    }

    function update() {
        toolsGroup.children.iterate((tool) => {
            if (tool && tool.y > 600) tool.destroy();
        });

        if (isPlaying && toolsGroup.countActive() === 0) {
            isPlaying = false;
            document.getElementById('spin-btn').disabled = false;
        }
    }

    function createSquareTexture(key, color, isPickaxe) {
        let g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(Phaser.Display.Color.HexStringToColor(color).color, 1);
        if (isPickaxe) {
            // Рисуем Т-образную кирку
            g.fillRect(15, 10, 44, 12);
            g.fillRect(31, 22, 12, 32);
        } else {
            // Рисуем блок с рамкой
            g.fillRect(2, 2, 70, 58);
            g.lineStyle(2, 0x000000, 0.3);
            g.strokeRect(0, 0, 74, 62);
        }
        g.generateTexture(key, 74, 62);
    }

    function generateGrid() {
        blocksGroup.clear(true, true);
        
        // Послойная генерация шахты (5 столбцов, 6 строк)
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                let type = 'dirt';
                
                if (r === 5) {
                    type = 'bedrock'; // САМЫЙ НИЖНИЙ РЯД - ВСЕГДА БЕДРОК (ДЖЕКПОТ)
                } else if (r === 4) {
                    type = Math.random() < 0.3 ? 'diamond' : 'iron';
                } else if (r === 3) {
                    type = Math.random() < 0.4 ? 'iron' : 'stone';
                } else if (r > 0) {
                    type = Math.random() < 0.5 ? 'stone' : 'dirt';
                }

                let x = c * 80 + 50;
                let y = r * 64 + 140;
                
                let block = blocksGroup.create(x, y, type);
                block.setData('type', type);
                block.refreshBody();
            }
        }
    }

    function hitBlock(tool, block) {
        let blockType = block.getData('type');
        let toolType = tool.getData('type');
        
        let toolInfo = PICKAXE_TIERS[toolType];
        let blockInfo = BLOCK_TIERS[blockType];

        // ГЛАВНОЕ ПРАВИЛО: Если тир инструмента ниже тира блока -> кирка ломается и исчезает
        if (toolInfo.tier < blockInfo.tier) {
            // Эффект поломки кирки
            let breakEffect = scene.add.text(tool.x - 10, tool.y - 10, '❌', { fontSize: '20px' });
            scene.tweens.add({ targets: breakEffect, alpha: 0, y: tool.y - 30, duration: 400, onComplete: () => breakEffect.destroy() });
            
            tool.destroy();
            return;
        }

        // Если тир позволяет — ломаем блок и получаем деньги
        let payout = Math.floor(bet * blockInfo.payout);
        balance += payout;
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;

        if (blockType === 'bedrock') {
            document.getElementById('jackpot-alert').innerText = '🔥 ДЖЕКПОТ ПРОБИТ! 🔥';
            setTimeout(() => { document.getElementById('jackpot-alert').innerText = ''; }, 3000);
        }

        block.destroy();
    }

    function pressSpin() {
        if (isPlaying || balance < bet) return;

        isPlaying = true;
        document.getElementById('spin-btn').disabled = true;

        balance -= bet;
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;

        generateGrid();

        const toolKeys = Object.keys(PICKAXE_TIERS);
        let selectedTools = [];

        // 1. Показываем в инвентаре случайный разброс кирок
        for (let c = 0; c < 5; c++) {
            let randKey = toolKeys[Math.floor(Math.random() * toolKeys.length)];
            selectedTools.push(randKey);
            invSlots[c].innerText = PICKAXE_TIERS[randKey].label;
        }

        // 2. С небольшой задержкой запускаем физическое падение вниз по линиям
        scene.time.delayedCall(500, () => {
            for (let c = 0; c < 5; c++) {
                let toolType = selectedTools[c];
                let x = c * 80 + 50;
                let y = 50;
                
                let item = toolsGroup.create(x, y, toolType);
                item.setData('type', toolType);
                item.setOrigin(0.5);
                item.setVelocityY(280 + Math.random() * 50); // Скорость падения
                item.setGravityY(400);
            }
        });
    }

    function changeBet(type) {
        if (isPlaying) return;
        if (type === 'min') bet = 10;
        else if (type === 'max') bet = balance;
        else bet += type;

        if (bet < 10) bet = 10;
        if (bet > balance) bet = balance;

        document.getElementById('bet-txt').innerText = bet.toLocaleString();
    }
</script>

</body>
</html>
