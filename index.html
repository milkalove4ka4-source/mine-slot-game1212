<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Slot Original</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }
        #ui-bar {
            width: 420px;
            display: flex;
            justify-content: space-between;
            background: #2c2c2c;
            padding: 12px;
            border: 4px solid #4a4a4a;
            border-bottom: none;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: bold;
        }
        #game-div {
            border: 4px solid #4a4a4a;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .controls {
            width: 420px;
            background: #2c2c2c;
            border: 4px solid #4a4a4a;
            border-top: none;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }
        button {
            background: #4a4a4a;
            color: #fff;
            border: 2px solid #616161;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        button:hover { background: #5a5a5a; }
        #spin-btn {
            background: #4caf50;
            border: 2px solid #81c784;
            padding: 14px;
            font-size: 20px;
            color: white;
            text-shadow: 1px 1px #000;
        }
        #spin-btn:hover { background: #66bb6a; }
        #spin-btn:disabled { background: #333; border-color: #555; cursor: not-allowed; }
        .yellow { color: #ffeb3b; }
        .green { color: #4caf50; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div>БАЛАНС: <span id="balance-txt" class="green">$1,000,000</span></div>
        <div>СТАВКА: <span id="bet-txt" class="yellow">200</span></div>
    </div>

    <div id="game-div"></div>

    <div class="controls">
        <div class="bet-row">
            <button onclick="changeBet('min')">МИН</button>
            <button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(100)">+100</button>
            <button onclick="changeBet('max')">МАКС</button>
        </div>
        <button id="spin-btn" onclick="pressSpin()">Вращать барабаны</button>
    </div>

<script>
    let balance = 1000000;
    let bet = 200;
    let isPlaying = false;
    
    const config = {
        type: Phaser.AUTO,
        width: 420,
        height: 560,
        parent: 'game-div',
        backgroundColor: '#3a2f28',
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let scene, blocksGroup, toolsGroup;

    function preload() {
        scene = this;
        // Текстуры блоков
        createTexture('dirt', '#866043');
        createTexture('stone', '#737373');
        createTexture('gold', '#fdb813');
        createTexture('diamond', '#4dedf4');
        
        // Текстуры падающих предметов (Кирки и ТНТ)
        createToolTexture('pick_wood', '#b58259', 'P');
        createToolTexture('pick_iron', '#d1d1d1', 'P');
        createToolTexture('pick_dia', '#4dedf4', 'P');
        createToolTexture('tnt', '#f44336', 'TNT');
    }

    function create() {
        blocksGroup = this.physics.add.staticGroup();
        toolsGroup = this.physics.add.group();

        // Верхняя панель инвентаря (как на картинке)
        let invBackground = this.add.graphics();
        invBackground.fillStyle(0x222222, 1);
        invBackground.fillRect(10, 10, 400, 90);
        invBackground.lineStyle(4, 0x555555, 1);
        invBackground.strokeRect(10, 10, 400, 90);

        generateGrid();

        // Физика столкновений
        this.physics.add.overlap(toolsGroup, blocksGroup, hitBlock, null, this);
    }

    function update() {
        toolsGroup.children.iterate((tool) => {
            if (tool && tool.y > 600) tool.destroy();
        });

        if (isPlaying && toolsGroup.countActive() === 0) {
            isPlaying = false;
            document.getElementById('spin-btn').disabled = false;
        }
    }

    function createTexture(key, color) {
        let g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(Phaser.Display.Color.HexStringToColor(color).color, 1);
        g.fillRect(2, 2, 70, 60);
        g.lineStyle(2, 0x111111, 0.4);
        g.strokeRect(0, 0, 74, 64);
        g.generateTexture(key, 74, 64);
    }

    function createToolTexture(key, color, text) {
        let g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(Phaser.Display.Color.HexStringToColor(color).color, 1);
        g.fillRect(10, 10, 44, 44);
        g.generateTexture(key, 64, 64);
    }

    function generateGrid() {
        blocksGroup.clear(true, true);
        const oreTypes = ['dirt', 'dirt', 'stone', 'stone', 'gold', 'diamond'];
        
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                let type = oreTypes[Math.floor(Math.random() * (r + 1 > 6 ? 6 : r + 1))];
                let x = c * 80 + 50;
                let y = r * 66 + 160;
                
                let block = blocksGroup.create(x, y, type);
                block.setData('type', type);
                block.refreshBody();
            }
        }
    }

    function hitBlock(tool, block) {
        let type = block.getData('type');
        let toolType = tool.getData('type');
        let multiplier = 0;

        if (type === 'dirt') multiplier = 0.2;
        else if (type === 'stone') multiplier = 0.5;
        else if (type === 'gold') multiplier = 3;
        else if (type === 'diamond') multiplier = 12;

        let payout = Math.floor(bet * multiplier);
        balance += payout;
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;

        // МЕХАНИКА TNT: Взрывает соседние блоки вокруг себя
        if (toolType === 'tnt') {
            explodeTNT(block.x, block.y);
        }

        block.destroy();
        
        // Сила торможения в зависимости от кирки
        if (toolType === 'pick_wood') tool.setVelocityY(tool.body.velocity.y * 0.5);
        if (toolType === 'pick_iron') tool.setVelocityY(tool.body.velocity.y * 0.8);
    }

    function explodeTNT(ex, ey) {
        blocksGroup.children.iterate((block) => {
            if (block) {
                let dist = Phaser.Math.Distance.Between(ex, ey, block.x, block.y);
                if (dist < 100) { // Радиус взрыва ТНТ
                    let type = block.getData('type');
                    let mult = type === 'diamond' ? 12 : 2;
                    balance += Math.floor(bet * mult);
                    
                    // Эффект вспышки взрыва
                    let boom = scene.add.circle(block.x, block.y, 10, 0xffaa00);
                    scene.tweens.add({ targets: boom, scale: 4, alpha: 0, duration: 200, onComplete: () => boom.destroy() });
                    
                    block.destroy();
                }
            }
        });
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;
    }

    function pressSpin() {
        if (isPlaying || balance < bet) return;

        isPlaying = true;
        document.getElementById('spin-btn').disabled = true;

        balance -= bet;
        document.getElementById('balance-txt').innerText = `$${balance.toLocaleString()}`;

        generateGrid();

        const tools = ['pick_wood', 'pick_iron', 'pick_dia', 'tnt'];

        // Сбрасываем предметы из инвентаря вниз
        for (let c = 0; c < 5; c++) {
            let randTool = tools[Math.floor(Math.random() * tools.length)];
            let x = c * 80 + 50;
            let y = 50; // Падают прямо из зоны инвентаря
            
            let item = toolsGroup.create(x, y, randTool);
            item.setData('type', randTool);
            item.setOrigin(0.5);
            item.setVelocityY(250 + Math.random() * 100);
            item.setGravityY(500); // Гравитация падения
        }
    }

    function changeBet(type) {
        if (isPlaying) return;
        if (type === 'min') bet = 10;
        else if (type === 'max') bet = balance;
        else bet += type;

        if (bet < 10) bet = 10;
        if (bet > balance) bet = balance;

        document.getElementById('bet-txt').innerText = bet.toLocaleString();
    }
</script>

</body>
</html>
